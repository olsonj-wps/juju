<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juju - Brazil Data Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a7ca2 0%, #58075a 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0a7ca2;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title {
            color: white;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 25px;
            padding-left: 15px;
            border-left: 4px solid rgba(255,255,255,0.5);
        }

        .states-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .state-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .state-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #0a7ca2, #58075a);
            transition: width 0.3s ease;
        }

        .state-card:hover::before {
            width: 8px;
        }

        .state-card:hover {
            transform: translateX(5px);
        }

        .state-card h3 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 8px;
        }

        .state-card .abbr {
            display: inline-block;
            background: #f0f7f9;
            color: #0a7ca2;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .state-card .region {
            font-size: 0.85rem;
            color: #888;
        }

        .region-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 8px;
        }

        .region-norte { background: #e8f5e9; color: #2e7d32; }
        .region-nordeste { background: #fff3e0; color: #e65100; }
        .region-sudeste { background: #e3f2fd; color: #1565c0; }
        .region-sul { background: #fce4ec; color: #c2185b; }
        .region-centro-oeste { background: #f3e5f5; color: #7b1fa2; }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 60px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        footer a {
            color: white;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }

            .stat-card .number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Juju</h1>
            <p>Exploring Brazil through data</p>
        </header>

        <div class="stats-row" id="stats">
            <div class="stat-card">
                <div class="number" id="total-states">--</div>
                <div class="label">States</div>
            </div>
            <div class="stat-card">
                <div class="number" id="total-regions">--</div>
                <div class="label">Regions</div>
            </div>
            <div class="stat-card">
                <div class="number" id="total-municipalities">--</div>
                <div class="label">Municipalities</div>
            </div>
            <div class="stat-card">
                <div class="number" id="largest-state">--</div>
                <div class="label">Largest State</div>
            </div>
        </div>

        <h2 class="section-title">States of Brazil</h2>

        <div id="states-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading Brazil data...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>Data from <a href="https://servicodados.ibge.gov.br" target="_blank">IBGE API</a> | Built with Juju</p>
    </footer>

    <script>
        const regionNames = {
            1: 'Norte',
            2: 'Nordeste',
            3: 'Sudeste',
            4: 'Sul',
            5: 'Centro-Oeste'
        };

        const regionClasses = {
            'Norte': 'region-norte',
            'Nordeste': 'region-nordeste',
            'Sudeste': 'region-sudeste',
            'Sul': 'region-sul',
            'Centro-Oeste': 'region-centro-oeste'
        };

        async function fetchBrazilData() {
            try {
                // Fetch states
                const statesRes = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome');
                const states = await statesRes.json();

                // Fetch municipalities count
                const municipalitiesRes = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/municipios');
                const municipalities = await municipalitiesRes.json();

                // Update stats
                document.getElementById('total-states').textContent = states.length;
                document.getElementById('total-regions').textContent = '5';
                document.getElementById('total-municipalities').textContent = municipalities.length.toLocaleString();
                document.getElementById('largest-state').textContent = 'AM';

                // Render states
                const container = document.getElementById('states-container');
                container.innerHTML = '';

                const grid = document.createElement('div');
                grid.className = 'states-grid';

                states.forEach((state, index) => {
                    const regionName = state.regiao.nome;
                    const card = document.createElement('div');
                    card.className = 'state-card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.innerHTML = `
                        <span class="abbr">${state.sigla}</span>
                        <h3>${state.nome}</h3>
                        <p class="region">
                            Region: <span class="region-badge ${regionClasses[regionName]}">${regionName}</span>
                        </p>
                    `;
                    grid.appendChild(card);
                });

                container.appendChild(grid);

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('states-container').innerHTML = `
                    <div class="loading">
                        <p>Error loading data. Please try again later.</p>
                    </div>
                `;
            }
        }

        // Initialize
        fetchBrazilData();
    </script>
</body>
</html>
